name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: cd backend && pip install -r requirements.txt
      - name: Test
        run: cd backend && PYTHONPATH=. python -m pytest tests/ -x -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: cd frontend && npm ci
      - name: Type check
        run: cd frontend && npx tsc --noEmit
