services:
  # ── Redis (RQ worker queue) ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: boardroom_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Neo4j (graph analytics — optional) ──────────────────────────────────
  neo4j:
    image: neo4j:5
    container_name: boardroom_neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/boardroom
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "boardroom", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── PostgreSQL (primary data store) ─────────────────────────────────────
  postgres:
    image: pgvector/pgvector:0.8.0-pg16
    container_name: boardroom_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: boardroom
      POSTGRES_PASSWORD: boardroom
      POSTGRES_DB: boardroom
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boardroom -d boardroom"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: boardroom_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://boardroom:boardroom@postgres:5432/boardroom
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: boardroom_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  worker-sim:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: boardroom_worker_sim
    command: python -m app.workers.simulation_worker
    environment:
      DATABASE_URL: postgresql://boardroom:boardroom@postgres:5432/boardroom
      REDIS_URL: redis://redis:6379/0
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-postmortem:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: boardroom_worker_pm
    command: python -m app.workers.postmortem_worker
    environment:
      DATABASE_URL: postgresql://boardroom:boardroom@postgres:5432/boardroom
      REDIS_URL: redis://redis:6379/0
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
