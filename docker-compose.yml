services:
  # ── Neo4j (graph analytics — optional) ──────────────────────────────────
  neo4j:
    image: neo4j:5
    container_name: boardroom_neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/boardroom
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "boardroom", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── PostgreSQL (primary data store) ─────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: boardroom_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: boardroom
      POSTGRES_PASSWORD: boardroom
      POSTGRES_DB: boardroom
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boardroom -d boardroom"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
